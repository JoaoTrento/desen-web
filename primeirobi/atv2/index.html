<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
</head>
<body>
    <form action="/cadastro" method="post">
        <fieldset>
            <legend>Crie a sua conta</legend>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" name="email" id="email" required>
            <br><br>

            <label for="senha">Senha:</label>
            <input type="password" name="senha" id="senha" minlength="8" required>
            <br><br>

            <p><b>Gênero:</b></p>
            <label for="genero_masculino">Masculino</label>
            <input type="radio" name="genero" id="genero_masculino" value="Masculino">
            <br>
            <label for="genero_feminino">Feminino</label>
            <input type="radio" name="genero" id="genero_feminino" value="Feminino">
            <br><br>
            
            <label for="biografia">Biografia:</label>
            <textarea name="biografia" id="biografia" placeholder="Fale um pouco sobre você..." rows="4"></textarea>
            <br><br>

            <label for="termos_uso">Aceito os Termos de Uso:</label>
            <input type="checkbox" name="termos_uso" id="termos_uso" required>
            <br><br>

            <input type="submit" value="Enviar">

        </fieldset>
    </form>
</body>
</html>
